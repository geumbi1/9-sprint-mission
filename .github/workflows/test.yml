name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # 💡 모든 단계를 discodeit 폴더 안에서 실행하도록 설정
    defaults:
      run:
        working-directory: ./discodeit

    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # 💡 파일 경로도 discodeit 폴더 기준으로 지정
          files: discodeit/build/reports/jacoco/test/jacocoTestReport.xml