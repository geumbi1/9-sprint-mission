name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    paths:
      - 'discodeit/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./discodeit

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # working-directory 설정이 있어도 files 경로는 프로젝트 루트 기준이 안전합니다.
          files: discodeit/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: true